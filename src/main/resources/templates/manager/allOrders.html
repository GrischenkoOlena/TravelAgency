<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title>Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>

<div th:insert="~{fragments/menu :: navbar}"></div>

<nav class="navbar navbar-expand-lg navbar-light bg-light" id="navbar">
  <div class="container-fluid">
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" th:href="@{/tours}">tours</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" th:href="@{/allOrders}">orders</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<h1 align="center">Orders</h1>

<div class="container">
  <table class="table table-bordered">
    <thead>
    <tr>
      <th scope="col">#ID</th>
      <th scope="col">Username</th>
      <th scope="col">Tour Title</th>
      <th scope="col">Price</th>
      <th scope="col">Status</th>
    </tr>
    </thead>
    <tbody>
    <!-- Fixed loop and columns to match the supposed properties -->
    <tr th:each="order : ${orders}">
      <td th:text="${order.id}"></td>
      <td th:text="${order.username}"></td>
      <td th:text="${order.voucherTitle}"></td>
      <td th:text="${order.price}"></td>
      <td th:text="${order.status}"></td>
      <!--<td><a th:href="@{/{id}/order(id=${voucher.id})}" class="btn btn-outline-success me-2" type="button">Order</a></td> -->
      <td>
        <form th:action="@{/{id}/canceled(id=${order.id})}" method="post" class="d-inline">
          <button type="submit" th:disabled="${#strings.toString(order.status) == 'CANCELED'}"
                  th:class="${#strings.toString(order.status) == 'CANCELED'} ? 'btn btn-secondary me-2' : 'btn btn-outline-success me-2'">Canceled</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <br>
  <div  th:if="${messageError}" style="color: red; margin-top: 10px;">
    <p th:text="${messageError}"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous">></script>
</body>
</html>
