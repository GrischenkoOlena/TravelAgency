<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>

<div th:insert="~{fragments/menu :: navbar}"></div>

<nav class="navbar navbar-expand-lg navbar-light bg-light" id="navbar">
  <div class="container-fluid">
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" th:href="@{/tours}">tours</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" th:href="@{/allOrders}">orders</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<h1 align="center">Dashboard</h1>
<div class="container">
  <form th:action="@{/addTour}" method="get" class="d-inline">
    <button type="submit" class="btn btn-outline-success me-2">Add new tour</button>
  </form>
</div>
<div class="container">
  <table class="table table-bordered">
    <thead>
    <tr>
      <th scope="col">Voucher Title</th>
      <th scope="col">Description</th>
      <th scope="col">Price</th>
      <th scope="col">Tour Type</th>
      <th scope="col">Transfer Type</th>
      <th scope="col">Hotel type</th>
      <th scope="col">Arrival Date</th>
      <th scope="col">Eviction Date</th>
      <th scope="col">Hot</th>
    </tr>
    </thead>
    <tbody>
    <!-- Fixed loop and columns to match the supposed properties -->
    <tr th:each="voucher : ${voucherPage}">
      <td th:text="${voucher.title}"></td>
      <td th:text="${voucher.description}"></td>
      <td th:text="${voucher.price}"></td>
      <td th:text="${voucher.tourType}"></td>
      <td th:text="${voucher.transferType}"></td>
      <td th:text="${voucher.hotelType}"></td>
      <td th:text="${voucher.arrivalDate}"></td>
      <td th:text="${voucher.evictionDate}"></td>
      <td th:text="${voucher.isHot ? 'Yes' : 'No'}"></td>
      <!--<td><a th:href="@{/{id}/order(id=${voucher.id})}" class="btn btn-outline-success me-2" type="button">Order</a></td> -->
      <td>
        <form th:action="@{/{id}/updateTour(id=${voucher.id})}" method="get" class="d-inline">
          <button type="submit" class="btn btn-outline-success me-2">Update</button>
        </form>
      </td>
      <td>
        <form th:action="@{/{id}/deleteTour(id=${voucher.id})}" method="post" class="d-inline">
          <button type="submit" class="btn btn-outline-success me-2">Delete</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <nav aria-label="Page navigation" th:if="${voucherPage.totalPages > 0}" >
    <ul class="pagination">

      <li class="page-item" th:classappend="${voucherPage.first} ? 'disabled'">
        <a class="page-link" th:href="@{/tours?(page=${voucherPage.number - 1})}" aria-label="Previous">
          <span aria-hidden="true">&laquo;</span>
        </a>
      </li>

      <li class="page-item"
          th:each="pageNumber : ${#numbers.sequence(0, voucherPage.totalPages - 1)}"
          th:classappend="${pageNumber == voucherPage.number} ? 'active'">
        <a class="page-link"
           th:href="@{/tours?(page=${pageNumber})}"
           th:text="${pageNumber + 1}">1</a>
      </li>

      <li class="page-item" th:classappend="${voucherPage.last} ? 'disabled'">
        <a class="page-link" th:href="@{/tours?(page=${voucherPage.number + 1})}" aria-label="Next">
          <span aria-hidden="true">&raquo;</span>
        </a>
      </li>

    </ul>
  </nav>


  <br>
  <div  th:if="${message}" style="color: blue; margin-top: 10px;">
    <p th:text="${message}"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous">></script>
</body>
</html>
