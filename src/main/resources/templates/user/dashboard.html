<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>

<div th:insert="~{fragments/menu :: navbar}"></div>

<nav class="navbar navbar-expand-lg navbar-light bg-light" id="navbar">
  <div class="container-fluid">
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" th:href="@{/orders}" th:text="#{dashboard.menu.orders}">orders</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" th:href="@{/profile}" th:text="#{dashboard.menu.profile}">profile</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<h1 align="center" th:text="#{dashboard.header}">Dashboard</h1>

<div class="container">
  <table class="table table-bordered">
    <thead>
    <tr>
      <th scope="col" th:text="#{dashboard.table.title}">Voucher Title</th>
      <th scope="col" th:text="#{dashboard.table.description}">Description</th>
      <th scope="col" th:text="#{dashboard.table.price}">Price</th>
      <th scope="col" th:text="#{dashboard.table.tourType}">Tour Type</th>
      <th scope="col" th:text="#{dashboard.table.transfer}">Transfer Type</th>
      <th scope="col" th:text="#{dashboard.table.hotel}">Hotel type</th>
      <th scope="col" th:text="#{dashboard.table.arrival}">Arrival Date</th>
      <th scope="col" th:text="#{dashboard.table.eviction}">Eviction Date</th>
      <th scope="col" th:text="#{dashboard.table.hot}">Hot</th>
    </tr>
    </thead>
    <tbody>
    <!-- Fixed loop and columns to match the supposed properties -->
    <tr th:each="voucher : ${voucherPage.content}">
      <td th:text="${voucher.title}"></td>
      <td th:text="${voucher.description}"></td>
      <td th:text="${voucher.price}"></td>
      <td th:text="${voucher.tourType}"></td>
      <td th:text="${voucher.transferType}"></td>
      <td th:text="${voucher.hotelType}"></td>
      <td th:text="${voucher.arrivalDate}"></td>
      <td th:text="${voucher.evictionDate}"></td>
      <td th:text="${voucher.isHot ? 'Yes' : 'No'}"></td>
      <!--<td><a th:href="@{/{id}/order(id=${voucher.id})}" class="btn btn-outline-success me-2" type="button">Order</a></td> -->
      <td>
        <form th:action="@{/{id}/order(id=${voucher.id})}" method="post" class="d-inline">
          <button type="submit" class="btn btn-outline-success me-2" th:text="#{dashboard.order}">Order</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <nav aria-label="Page navigation" th:if="${voucherPage.totalPages > 0}" >
    <ul class="pagination">

      <li class="page-item" th:classappend="${voucherPage.first} ? 'disabled'">
        <a class="page-link" th:href="@{/dashboard?(page=${voucherPage.number - 1})}" aria-label="Previous">
          <span aria-hidden="true">&laquo;</span>
        </a>
      </li>

      <li class="page-item"
          th:each="pageNumber : ${#numbers.sequence(0, voucherPage.totalPages - 1)}"
          th:classappend="${pageNumber == voucherPage.number} ? 'active'">
        <a class="page-link"
           th:href="@{/dashboard?(page=${pageNumber})}"
           th:text="${pageNumber + 1}">1</a>
      </li>

      <li class="page-item" th:classappend="${voucherPage.last} ? 'disabled'">
        <a class="page-link" th:href="@{/dashboard?(page=${voucherPage.number + 1})}" aria-label="Next">
          <span aria-hidden="true">&raquo;</span>
        </a>
      </li>

    </ul>
  </nav>

  <form method="get" class="row g-3 mb-4">
    <div class="col-md-3">
      <label for="tourType" class="form-label" th:text="#{dashboard.filter.header.tour}">Tour type</label>
      <select name="tourType" id="tourType" class="form-select">
        <option value="" th:text="#{dashboard.filter.header.allTour}">All Tour types</option>
        <option th:each="ttype : ${tourTypes}" th:value="${ttype}"
                th:text="${ttype}" th:selected="${ttype == tourType}"></option>
      </select>
    </div>

    <div class="col-md-3">
      <label for="hotel" class="form-label" th:text="#{dashboard.filter.header.hotel}">Hotel</label>
      <select name="hotelType" id="hotel" class="form-select">
        <option value="" th:text="#{dashboard.filter.header.allHotel}">All Hotel types</option>
        <option th:each="htype : ${hotelTypes}" th:value="${htype}"
                th:text="${htype}" th:selected="${htype == hotelType}"></option>
      </select>
    </div>

    <div class="col-md-3">
      <label for="transfer" class="form-label" th:text="#{dashboard.filter.header.transfer}">Transfer</label>
      <select name="transferType" id="transfer" class="form-select">
        <option value="" th:text="#{dashboard.filter.header.allTransfer}">All Transfer types</option>
        <option th:each="trans : ${transferTypes}" th:value="${trans}"
                th:text="${trans}" th:selected="${trans == transferType}"></option>
      </select>
    </div>

    <div class="col-md-3 d-flex align-items-end">
      <button type="submit" class="btn btn-primary w-100" th:text="#{dashboard.filter.button}">Search</button>
    </div>
  </form>

  <br>
  <div  th:if="${message}" style="color: blue; margin-top: 10px;">
    <p th:text="${message}"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous">></script>
</body>
</html>
