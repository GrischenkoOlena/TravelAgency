<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm border-0 p-5 bg-white rounded-3">
                <h1 class="display-1 fw-bold text-danger mb-3" th:text="${status} ?: 'Oops!'">500</h1>

                <h2 class="fs-4 fw-semibold text-dark mb-2">Something went wrong</h2>

                <p class="text-muted mb-4" th:text="${error} ?: 'An unexpected server error occurred. Please try again later.'">
                    An unexpected server error occurred. Please try again later.
                </p>

                <div>
                    <a th:href="@{/}" class="btn btn-primary px-4 py-2 fw-medium">
                        Return to Homepage
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
