<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-light" id="navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="#" th:text="#{main.header}">Travel Agency</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/}" th:text="#{main.home}">Home</a>
                </li>
            </ul>


            <nav class="navbar navbar-light bg-light">
                <form class="container-fluid justify-content-start">
                    <a th:href="@{/auth/login}" class="btn btn-outline-success me-2" th:text="#{main.signIn}">Sign in</a>
                    <a th:href="@{/auth/register}" class="btn btn-outline-success me-2" th:text="#{main.register}">Register</a>
                    <a th:href="@{/auth/perform_logout}" class="btn btn-sm btn-outline-secondary" th:text="#{main.signUp}">Sign up</a>
                </form>
            </nav>
        </div>
    </div>
</nav>
</body>
</html>
